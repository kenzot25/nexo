name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Binary (${{ matrix.os }} - ${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            suffix: macos-arm64
          - os: macos-latest
            arch: x64
            suffix: macos-x64
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Build binary
        run: |
          chmod +x scripts/build-binaries.sh
          ./scripts/build-binaries.sh
          mv dist/nexo "dist/nexo-${{ matrix.suffix }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: dist/nexo-${{ matrix.suffix }}

  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update Release
        run: |
          tag="${GITHUB_REF_NAME}"
          files=$(find dist -maxdepth 1 -type f | sort)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" $files --clobber
          else
            gh release create "$tag" $files --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
